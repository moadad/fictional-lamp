<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Jood Orders Pro</title>
  <style>
    :root{--bg:#f4f7fb;--card:#ffffff;--text:#16202a;--muted:#6b7785;--primary:#1664ff;--primary2:#0f4fd6;--success:#16a34a;--warning:#eab308;--danger:#dc2626;--border:#e6ebf2;--shadow:0 10px 30px rgba(17,24,39,.08)}
    *{box-sizing:border-box} html,body{margin:0;padding:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)} body{min-height:100vh}
    .hide{display:none!important}.app{max-width:1100px;margin:0 auto;min-height:100vh}.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
    .icon-btn,.tab-btn,.action-btn,.soft-btn,.danger-btn{border:none;cursor:pointer;border-radius:16px;transition:.2s ease;font-weight:700}.icon-btn{width:44px;height:44px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow);font-size:20px}
    .brand{flex:1;min-width:0}.brand h1{margin:0;font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand div{font-size:12px;color:var(--muted);margin-top:2px}.page{padding:14px}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.login-card{width:min(100%,420px);background:var(--card);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow);padding:24px}.login-title{text-align:center;margin:0 0 16px;font-size:28px}
    .logo{width:76px;height:76px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700}
    .input{width:100%;padding:14px 16px;border-radius:16px;border:1px solid var(--border);background:#fff;font-size:16px;outline:none}.input:focus{border-color:var(--primary)}.field{margin-bottom:12px}.action-btn{width:100%;padding:14px 16px;background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;font-size:16px}
    .soft-btn{padding:12px 14px;background:#eef4ff;color:var(--primary);font-size:14px}.danger-btn{padding:12px 14px;background:#fff0f0;color:var(--danger);font-size:14px}.section-title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:4px 0 12px}.section-title h2{margin:0;font-size:20px}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}.stat{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:14px;box-shadow:var(--shadow)}.stat .k{font-size:12px;color:var(--muted)}.stat .v{font-size:24px;font-weight:700;margin-top:6px}
    .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.filters-secondary{margin-top:-4px}.tab-btn{padding:12px 14px;background:#fff;border:1px solid var(--border);color:var(--text)}.tab-btn-secondary{background:#f7faff}.tab-btn.active{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:transparent}.tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:rgba(15,23,42,.08);font-size:11px;margin-inline-start:6px}.tab-btn.active .tab-count{background:rgba(255,255,255,.18)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.client-row{display:flex;align-items:center;gap:10px;justify-content:space-between}.client-main{min-width:0;flex:1}.client-name{font-weight:700;font-size:18px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.client-meta{color:var(--muted);font-size:13px;margin-top:6px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700}.badge.success{background:#ecfdf3;color:var(--success)}.badge.info{background:#eff6ff;color:#1d4ed8}.badge.warn{background:#fff9db;color:#9a6700}.badge.danger{background:#fef2f2;color:var(--danger)}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.searchbox{display:flex;gap:8px;margin-bottom:12px}
    .table-wrap{overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:18px} table{width:100%;border-collapse:collapse;background:#fff;min-width:760px} th,td{border-bottom:1px solid var(--border);padding:12px;text-align:center;font-size:14px} th{position:sticky;top:0;background:#f8fbff;z-index:1} tr:last-child td{border-bottom:none}
    .qty-input{width:96px;padding:10px;border:1px solid var(--border);border-radius:12px;text-align:center}.status-note{display:inline-flex;align-items:center;gap:6px;padding:7px 11px;border-radius:999px;font-size:12px;font-weight:700;margin:4px 6px 0 0;border:1px solid transparent}.status-note.ok{color:var(--success);background:#ecfdf3;border-color:#cfeedd}.status-note.no{color:var(--danger);background:#fef2f2;border-color:#f8d6d6}.status-note.warn{color:#9a6700;background:#fff9db;border-color:#f5e9a8}.empty{text-align:center;padding:26px;color:var(--muted)}
    .loading{position:fixed;inset:auto 14px 14px 14px;z-index:80;background:#111827;color:#fff;padding:12px 14px;border-radius:16px;box-shadow:var(--shadow);font-size:14px}.drawer-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.35);z-index:90;opacity:0;pointer-events:none;transition:.2s}.drawer-backdrop.show{opacity:1;pointer-events:auto}
    .drawer{position:fixed;top:0;right:0;height:100vh;width:min(86vw,340px);background:#fff;z-index:91;transform:translateX(100%);transition:.25s ease;border-left:1px solid var(--border);box-shadow:-20px 0 50px rgba(0,0,0,.12);padding:16px;overflow:auto}.drawer.show{transform:translateX(0)}.drawer h3{margin:0 0 14px}.drawer .item{width:100%;text-align:right;padding:14px;border:none;background:#fff;border-radius:16px;margin-bottom:8px;border:1px solid var(--border);font-weight:700;cursor:pointer}.drawer .item.primary{background:#eef4ff;color:var(--primary)}.drawer .item.danger{background:#fff1f2;color:var(--danger)}
    .screen{display:none}.screen.active{display:block}.subtop{display:flex;align-items:center;gap:8px;margin-bottom:12px}.subtop h2{margin:0;font-size:20px;flex:1}.print-actions{display:flex;gap:8px;flex-wrap:wrap}.mini{font-size:12px;color:var(--muted)}.summary-line{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.chip{padding:8px 10px;border-radius:999px;background:#f7faff;border:1px solid var(--border);font-size:12px}
    @media (min-width:700px){.stats{grid-template-columns:repeat(4,1fr)}}
    @media print{@page{size:A4;margin:12mm}body{background:#fff!important}.no-print{display:none!important}.app{max-width:none}.page{padding:0}.card,.stat,.table-wrap{box-shadow:none!important;border:1px solid #d7d7d7!important}table{min-width:unset!important}th,td{font-size:12px;padding:8px}.screen{display:none!important}.screen.print-target{display:block!important}}
  </style>
</head>
<body>
  <div id="loading" class="loading hide">جاري التحميل...</div>
  <div id="drawerBackdrop" class="drawer-backdrop" onclick="closeDrawer()"></div>
  <aside id="drawer" class="drawer no-print">
    <h3>القائمة</h3>
    <button class="item primary" onclick="goHome();closeDrawer()">🏠 الرئيسية</button>
    <button class="item" onclick="openScreen('dashboardScreen');closeDrawer()">📊 العملاء</button>
    <button class="item" onclick="openScreen('modelsScreen');loadModels();closeDrawer()">📦 الموديلات</button>
    <button class="item" onclick="openScreen('searchScreen');closeDrawer()">🔍 البحث</button>
    <button class="item" onclick="printCurrent()">🖨️ طباعة الشاشة</button>
    <div id="adminArea" class="hide" style="margin-top:16px">
      <h3 style="margin-top:18px">إعدادات الأدمن</h3>
      <div class="field"><input id="apiUrlInput" class="input" placeholder="رابط Apps Script Web App" /></div>
      <div style="display:flex;gap:8px"><button class="soft-btn" style="flex:1" onclick="saveApiUrl()">حفظ الرابط</button><button class="danger-btn" style="flex:1" onclick="resetApiUrl()">إرجاع الافتراضي</button></div>
      <div class="mini" style="margin-top:8px">هذه الإعدادات لا تظهر إلا للأدمن.</div>
    </div>
    <button class="item danger" style="margin-top:20px" onclick="logout()">تسجيل الخروج</button>
  </aside>

  <div id="loginScreen" class="login-wrap">
    <div class="login-card">
      <div class="logo">📦</div>
      <h1 class="login-title">Jood Orders Pro</h1>
      <div class="field"><input id="user" class="input" placeholder="اسم المستخدم" autocomplete="username" /></div>
      <div class="field"><input id="pass" class="input" type="password" placeholder="كلمة المرور" autocomplete="current-password" /></div>
      <button id="loginBtn" class="action-btn" onclick="doLogin()">تسجيل الدخول</button>
      <div class="mini" id="loginStatus" style="text-align:center;margin-top:12px"></div>
    </div>
  </div>

  <div id="appScreen" class="app hide">
    <div class="topbar no-print">
      <button class="icon-btn" onclick="toggleDrawer()">☰</button>
      <div class="brand"><h1 id="appTitle">Jood Orders Pro</h1><div id="statusLine">جاهز</div></div>
      <button class="icon-btn" onclick="refreshAll()">⟳</button>
      <button class="icon-btn" onclick="printCurrent()">🖨</button>
    </div>

    <div class="page">
      <section id="dashboardScreen" class="screen active">
        <div class="section-title"><h2>لوحة العملاء</h2><div class="print-actions no-print"><button class="soft-btn" onclick="printSection('dashboardPrintArea')">طباعة العملاء</button></div></div>
        <div id="summaryCards" class="stats"></div>
        <div class="filters no-print">
          <button id="tabAll" class="tab-btn active" onclick="setReadyFilter(false)">كل العملاء</button>
          <button id="tabReady" class="tab-btn" onclick="setReadyFilter(true)">العملاء الجاهزون</button>
        </div>
        <div class="filters filters-secondary no-print">
          <button id="statusAll" class="tab-btn tab-btn-secondary active" onclick="setStatusFilter('all')">كل الحالات <span class="tab-count" id="countAll">0</span></button>
          <button id="statusDone" class="tab-btn tab-btn-secondary" onclick="setStatusFilter('done')">مكتمل <span class="tab-count" id="countDone">0</span></button>
          <button id="statusPartial" class="tab-btn tab-btn-secondary" onclick="setStatusFilter('partial')">جزئي <span class="tab-count" id="countPartial">0</span></button>
          <button id="statusNotStarted" class="tab-btn tab-btn-secondary" onclick="setStatusFilter('not-started')">لم يبدأ <span class="tab-count" id="countNotStarted">0</span></button>
        </div>
        <div id="dashboardPrintArea"><div id="dashboardCards"></div></div>
      </section>

      <section id="clientScreen" class="screen">
        <div class="subtop no-print"><button class="icon-btn" onclick="backToDashboard()">←</button><h2 id="clientTitle">طلبية العميل</h2><button class="soft-btn" onclick="printSection('clientPrintArea')">طباعة الطلبية</button></div>
        <div id="clientPrintArea">
          <div id="clientSummary" class="card"></div>
          <div class="card"><div class="table-wrap"><table><thead><tr><th>الموديل</th><th>المطلوب</th><th>المسلّم</th><th>المتبقي</th><th>المخزون</th><th>ملاحظة</th><th id="deliverHead" class="no-print">تسليم</th></tr></thead><tbody id="clientTableBody"></tbody></table></div></div>
          <div id="deliverToolbar" class="toolbar no-print"><button class="action-btn" style="max-width:260px" onclick="deliverCurrentClient()">🚚 تنفيذ التسليم</button></div>
        </div>
      </section>

      <section id="searchScreen" class="screen">
        <div class="section-title"><h2>البحث</h2><div class="no-print"><button class="soft-btn" onclick="printSection('searchResultsWrap')">طباعة النتائج</button></div></div>
        <div class="searchbox no-print"><input id="searchInput" class="input" placeholder="ابحث باسم العميل..." oninput="debouncedSearch()" /></div>
        <div id="searchResultsWrap"><div id="searchResults"></div></div>
      </section>

      <section id="modelsScreen" class="screen">
        <div class="section-title"><h2>الموديلات</h2><div class="no-print"><button class="soft-btn" onclick="printSection('modelsPrintArea')">طباعة الموديلات</button></div></div>
        <div id="modelsPrintArea"><div id="modelsContainer"></div></div>
      </section>
    </div>
  </div>

  <script>
    const DEFAULT_API_URL = "https://script.google.com/macros/s/AKfycbw-TgIK0QH71_3QRjNvLj6MHZfuivmLOZ1a65NOHksI8LzO-QcRY4aY-90iektum3Mz8g/exec";
    const STORAGE_KEYS = { API_URL:"jood_api_url", SESSION:"jood_session_v2", INSTALL_HIDDEN:"jood_install_hidden_once" };
    let readyFilter = false, statusFilter = "all", dashboardClients = [], clientStatusCache = {}, currentClient = "", currentClientModels = [], currentUser = null, autoRefreshTimer = null, searchTimer = null, beforeInstallPromptEvent = null;
    function $(id){ return document.getElementById(id); }
    function esc(v){ return String(v ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;"); }
    function num(v){ const n = Number(v); return isNaN(n) ? 0 : n; }
    function showLoading(text){ $("loading").textContent = text || "جاري التحميل..."; $("loading").classList.remove("hide"); }
    function hideLoading(){ $("loading").classList.add("hide"); }
    function setStatus(text){ $("statusLine").textContent = text || "جاهز"; }
    function getApiUrl(){ return localStorage.getItem(STORAGE_KEYS.API_URL) || DEFAULT_API_URL; }
    function isAdmin(){ const role = String((currentUser && currentUser.role) || ""); return role.includes("admin") || role.includes("ادمن") || role.includes("أدمن") || role.includes("مدير"); }
    function openScreen(id){ document.querySelectorAll(".screen").forEach(s => s.classList.remove("active","print-target")); const el = $(id); if(el) el.classList.add("active"); }
    function goHome(){ openScreen("dashboardScreen"); }
    function toggleDrawer(){ $("drawer").classList.toggle("show"); $("drawerBackdrop").classList.toggle("show"); }
    function closeDrawer(){ $("drawer").classList.remove("show"); $("drawerBackdrop").classList.remove("show"); }
    function saveSession(){ if(currentUser) localStorage.setItem(STORAGE_KEYS.SESSION, JSON.stringify(currentUser)); }
    function loadSession(){ try{ const raw = localStorage.getItem(STORAGE_KEYS.SESSION); return raw ? JSON.parse(raw) : null; }catch(_){ return null; } }
    function logout(){ localStorage.removeItem(STORAGE_KEYS.SESSION); currentUser = null; clearInterval(autoRefreshTimer); $("appScreen").classList.add("hide"); $("loginScreen").classList.remove("hide"); $("adminArea").classList.add("hide"); closeDrawer(); $("pass").value = ""; $("loginStatus").textContent = ""; }
    function jsonp(action, params = {}){ return new Promise((resolve, reject) => { const callbackName = "__jp_" + Date.now() + "_" + Math.floor(Math.random()*1000000); const script = document.createElement("script"); const timeout = setTimeout(() => { cleanup(); reject(new Error("انتهت مهلة الاتصال بالخادم")); }, 25000); function cleanup(){ clearTimeout(timeout); if(script.parentNode) script.parentNode.removeChild(script); try { delete window[callbackName]; } catch(_) { window[callbackName] = undefined; } } window[callbackName] = function(data){ cleanup(); resolve(data); }; const url = new URL(getApiUrl()); url.searchParams.set("action", action); url.searchParams.set("callback", callbackName); Object.keys(params).forEach(key => { const v = params[key]; if(v !== undefined && v !== null) url.searchParams.set(key, v); }); script.src = url.toString(); script.onerror = function(){ cleanup(); reject(new Error("فشل الاتصال بالخادم")); }; document.body.appendChild(script); }); }
    function encodeItems(items){ const json = JSON.stringify(items || []); return btoa(unescape(encodeURIComponent(json))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, ""); }
    function getStatusMeta(code, readyMode){
      if(readyMode){
        if(code === "done") return { code:"done", label:"جاهز بالكامل للتسليم", badgeClass:"info" };
        if(code === "partial") return { code:"partial", label:"جاهز جزئيًا", badgeClass:"warn" };
        return { code:"not-started", label:"غير جاهز", badgeClass:"danger" };
      }
      if(code === "done") return { code:"done", label:"مكتمل التسليم", badgeClass:"success" };
      if(code === "partial") return { code:"partial", label:"جزئي", badgeClass:"warn" };
      return { code:"not-started", label:"لم يبدأ", badgeClass:"danger" };
    }
    function getProgressState(required, delivered){
      const req = num(required), del = num(delivered);
      if(del <= 0) return getStatusMeta("not-started", false);
      if(req > 0 && del < req) return getStatusMeta("partial", false);
      return getStatusMeta("done", false);
    }
    function getReadinessState(models){
      if(Array.isArray(models) && models.length){
        const isReady = m => num(m.availableToDeliver || m.stockQty) > 0 || !!m.available;
        const allReady = models.every(isReady);
        const anyReady = models.some(isReady);
        if(allReady) return getStatusMeta("done", true);
        if(anyReady) return getStatusMeta("partial", true);
      }
      return getStatusMeta("not-started", true);
    }
    function getClientProgressState(client){
      return (client && client.progressState) ? client.progressState : getStatusMeta("not-started", readyFilter);
    }
    function evaluateClientProgressState(models, required, delivered, readyMode){
      if(readyMode) return getReadinessState(models);
      if(Array.isArray(models) && models.length){
        const allDelivered = models.every(m => num(m.delivered) > 0);
        const anyDelivered = models.some(m => num(m.delivered) > 0);
        if(allDelivered) return getStatusMeta("done", false);
        if(anyDelivered) return getStatusMeta("partial", false);
        return getStatusMeta("not-started", false);
      }
      return getProgressState(required, delivered);
    }
    async function enrichDashboardStatuses(clients, readyOnly){
      const enriched = await Promise.all((clients || []).map(async client => {
        const cacheKey = `${readyOnly ? 1 : 0}:${client.client}`;
        if(clientStatusCache[cacheKey]) return { ...client, progressState: clientStatusCache[cacheKey] };
        try{
          const res = await jsonp("getClientModels", { client: client.client, ready: "false" });
          const models = (res && res.data) || [];
          const progressState = evaluateClientProgressState(models, client.required, client.delivered, readyOnly);
          clientStatusCache[cacheKey] = progressState;
          return { ...client, progressState };
        }catch(_){
          return { ...client, progressState: readyOnly ? getStatusMeta("not-started", true) : getProgressState(client.required, client.delivered) };
        }
      }));
      dashboardClients = enriched;
    }
    function clearClientStatusCache(client){
      Object.keys(clientStatusCache).forEach(key => { if(key.endsWith(`:${client}`)) delete clientStatusCache[key]; });
    }
    function statusBadge(state){
      const currentState = (state && typeof state === "object") ? state : getStatusMeta("not-started", readyFilter);
      return `<span class="badge ${currentState.badgeClass}">${esc(currentState.label)}</span>`;
    }
    function applyStatusFilter(list){
      if(statusFilter === "all") return list;
      return list.filter(item => getClientProgressState(item).code === statusFilter);
    }
    function updateStatusFilterButtons(){
      const counts = { all: dashboardClients.length, done: 0, partial: 0, "not-started": 0 };
      dashboardClients.forEach(item => { counts[getClientProgressState(item).code] += 1; });
      const labels = readyFilter ? { done:"جاهز بالكامل", partial:"جاهز جزئيًا", notStarted:"غير جاهز" } : { done:"مكتمل التسليم", partial:"جزئي", notStarted:"لم يبدأ" };
      $("statusAll").innerHTML = `كل الحالات <span class="tab-count" id="countAll">${counts.all}</span>`;
      $("statusDone").innerHTML = `${labels.done} <span class="tab-count" id="countDone">${counts.done}</span>`;
      $("statusPartial").innerHTML = `${labels.partial} <span class="tab-count" id="countPartial">${counts.partial}</span>`;
      $("statusNotStarted").innerHTML = `${labels.notStarted} <span class="tab-count" id="countNotStarted">${counts["not-started"]}</span>`;
      $("statusAll").classList.toggle("active", statusFilter === "all");
      $("statusDone").classList.toggle("active", statusFilter === "done");
      $("statusPartial").classList.toggle("active", statusFilter === "partial");
      $("statusNotStarted").classList.toggle("active", statusFilter === "not-started");
    }
    function setStatusFilter(value){
      statusFilter = value || "all";
      updateStatusFilterButtons();
      renderDashboardCards();
    }
    function renderDashboardCards(){
      const wrap = $("dashboardCards");
      const filtered = applyStatusFilter(dashboardClients);
      if(!filtered.length){
        wrap.innerHTML = `<div class="card empty">لا توجد بيانات مطابقة للحالة المحددة</div>`;
        return;
      }
      wrap.innerHTML = filtered.map(c => {
        const progressState = getClientProgressState(c);
        return `<div class="card"><div class="client-row"><div class="client-main"><div class="client-name" onclick="openClient('${encodeURIComponent(c.client)}')">${esc(c.client)}</div><div class="client-meta">المطلوب ${esc(c.required)} | المسلم ${esc(c.delivered)} | المتبقي ${esc(c.remaining)}</div><div class="summary-line">${statusBadge(progressState)}${c.invoices ? `<span class="chip">الفواتير: ${esc(c.invoices)}</span>` : ""}${c.readyModels && c.readyModels.length ? `<span class="chip">موديلات جاهزة: ${esc(c.readyModels.length)}</span>` : ""}</div></div><div class="no-print"><button class="soft-btn" onclick="openClient('${encodeURIComponent(c.client)}')">فتح</button></div></div></div>`;
      }).join("");
    }
    async function doLogin(){ const user = $("user").value.trim(), pass = $("pass").value.trim(); if(!user || !pass){ $("loginStatus").textContent = "أدخل اسم المستخدم وكلمة المرور"; return; } $("loginBtn").disabled = true; $("loginStatus").textContent = "جاري التحقق..."; try{ const res = await jsonp("login", { user, pass }); if(!res || !res.ok){ $("loginStatus").textContent = "بيانات الدخول غير صحيحة"; return; } currentUser = { user: res.user || user, role: res.role || "", app: res.app || null }; saveSession(); $("loginScreen").classList.add("hide"); $("appScreen").classList.remove("hide"); $("appTitle").textContent = (res.app && res.app.title) || "Jood Orders Pro"; $("apiUrlInput").value = getApiUrl(); $("adminArea").classList.toggle("hide", !isAdmin()); setStatus("تم تسجيل الدخول"); await bootApp(); } catch(err){ $("loginStatus").textContent = err.message || "حدث خطأ"; } finally { $("loginBtn").disabled = false; } }
    async function bootApp(){ openScreen("dashboardScreen"); await Promise.all([loadSummary(), loadDashboard(false)]); if(autoRefreshTimer) clearInterval(autoRefreshTimer); autoRefreshTimer = setInterval(async () => { if($("dashboardScreen").classList.contains("active")){ await Promise.all([loadSummary(), loadDashboard(readyFilter, true)]); } }, 15000); initInstallPrompt(); }
    async function loadSummary(){ try{ const res = await jsonp("summary"); const d = (res && res.data) || {}; $("summaryCards").innerHTML = `<div class="stat"><div class="k">كل العملاء</div><div class="v">${esc(d.allClients || 0)}</div></div><div class="stat"><div class="k">العملاء الجاهزون</div><div class="v">${esc(d.readyClients || 0)}</div></div><div class="stat"><div class="k">إجمالي المتبقي</div><div class="v">${esc(d.totalRemaining || 0)}</div></div><div class="stat"><div class="k">إجمالي المخزون</div><div class="v">${esc(d.stockQtyTotal || 0)}</div></div>`; } catch(_){} }
    function setReadyFilter(val){ readyFilter = !!val; $("tabAll").classList.toggle("active", !readyFilter); $("tabReady").classList.toggle("active", readyFilter); updateStatusFilterButtons(); loadDashboard(readyFilter); }
    async function loadDashboard(readyOnly, silent){ if(!silent) showLoading("جاري تحميل العملاء..."); setStatus(readyOnly ? "عرض العملاء الجاهزين" : "عرض كل العملاء"); try{ const res = await jsonp("getDashboardClients", { ready: readyOnly ? "true" : "false" }); dashboardClients = ((res && res.data) || []).map(client => ({ ...client, progressState: readyOnly ? getStatusMeta("partial", true) : getProgressState(client.required, client.delivered) })); updateStatusFilterButtons(); if(!dashboardClients.length){ $("dashboardCards").innerHTML = `<div class="card empty">لا توجد بيانات للعرض</div>`; return; } renderDashboardCards(); await enrichDashboardStatuses(dashboardClients, readyOnly); updateStatusFilterButtons(); renderDashboardCards(); } catch(err){ $("dashboardCards").innerHTML = `<div class="card empty">${esc(err.message || "حدث خطأ")}</div>`; } finally { hideLoading(); } }
    async function refreshAll(){ try{ showLoading("جاري التحديث..."); await Promise.all([ loadSummary(), loadDashboard(readyFilter, true), $("modelsScreen").classList.contains("active") ? loadModels() : Promise.resolve() ]); if($("clientScreen").classList.contains("active") && currentClient){ await openClient(encodeURIComponent(currentClient), true); } setStatus("تم التحديث"); } finally { hideLoading(); } }
    async function openClient(clientEncoded, silent){ const client = decodeURIComponent(clientEncoded); currentClient = client; if(!silent) showLoading("جاري تحميل الطلبية..."); openScreen("clientScreen"); $("clientTitle").textContent = readyFilter ? `طلبية العميل الجاهزة: ${client}` : `طلبية العميل: ${client}`; try{ const visibleRequest = jsonp("getClientModels", { client, ready: readyFilter ? "true" : "false" }); const fullRequest = readyFilter ? jsonp("getClientModels", { client, ready: "false" }) : Promise.resolve(null); const [visibleRes, fullRes] = await Promise.all([visibleRequest, fullRequest]); currentClientModels = (visibleRes && visibleRes.data) || []; renderClientDetails(client, currentClientModels, ((fullRes && fullRes.data) || currentClientModels)); setStatus("طلبية العميل: " + client); } catch(err){ $("clientSummary").innerHTML = `<div class="empty">${esc(err.message || "حدث خطأ")}</div>`; $("clientTableBody").innerHTML = ""; } finally { hideLoading(); } }
    function renderClientDetails(client, rows, allRows){ const totalRequired = rows.reduce((a,b)=>a+num(b.required),0); const totalDelivered = rows.reduce((a,b)=>a+num(b.delivered),0); const totalRemaining = rows.reduce((a,b)=>a+num(b.remaining),0); const sourceRows = (allRows && allRows.length) ? allRows : rows; const deliveryState = evaluateClientProgressState(sourceRows, sourceRows.reduce((a,b)=>a+num(b.required),0), sourceRows.reduce((a,b)=>a+num(b.delivered),0), false); const readinessState = evaluateClientProgressState(sourceRows, 0, 0, true); clearClientStatusCache(client); clientStatusCache[`0:${client}`] = deliveryState; clientStatusCache[`1:${client}`] = readinessState; const clientState = readyFilter ? readinessState : deliveryState; $("clientSummary").innerHTML = `<div style="font-size:22px;font-weight:700">${esc(client)}</div><div class="summary-line">${statusBadge(clientState)}<span class="chip">المطلوب: ${esc(totalRequired)}</span><span class="chip">المسلّم: ${esc(totalDelivered)}</span><span class="chip">المتبقي: ${esc(totalRemaining)}</span>${readyFilter ? `<span class="chip">حالة الجاهزية</span><span class="chip">عرض الموديلات الجاهزة فقط</span>` : `<span class="chip">حالة التسليم</span><span class="chip">عرض كل موديلات العميل</span>`}</div>`; $("deliverHead").classList.toggle("hide", !readyFilter); $("deliverToolbar").classList.toggle("hide", !readyFilter); if(!rows.length){ $("clientTableBody").innerHTML = `<tr><td colspan="${readyFilter ? 7 : 6}" class="empty">لا توجد موديلات متاحة للعرض</td></tr>`; return; } $("clientTableBody").innerHTML = rows.map((m, i) => { const isAvailable = num(m.availableToDeliver || m.stockQty) > 0; const notes = `<div class="status-note ${num(m.delivered) > 0 ? "ok" : (isAvailable ? "ok" : "no")}">${num(m.delivered) > 0 ? "تم تسليم" : (isAvailable ? "متوفر" : "غير متوفر")}</div>`; const deliverCell = readyFilter ? `<td class="no-print"><input class="qty-input" type="number" min="1" max="${esc(m.availableToDeliver || 0)}" data-row="${i}" placeholder="${num(m.availableToDeliver)>0 ? 'الكمية' : '0'}" ${num(m.availableToDeliver) > 0 ? "" : "disabled"} /></td>` : ``; return `<tr><td>${esc(m.model)}</td><td>${esc(m.required)}</td><td>${esc(m.delivered)}</td><td>${esc(m.remaining)}</td><td>${esc(m.stockQty)}</td><td>${notes}</td>${deliverCell}</tr>`; }).join(""); currentClientModels = rows; }
    async function deliverCurrentClient(){ if(!readyFilter || !currentClient) return; const inputs = Array.from(document.querySelectorAll("#clientTableBody input[data-row]")); const items = []; inputs.forEach(inp => { const idx = num(inp.getAttribute("data-row")); const q = num(inp.value); const row = currentClientModels[idx]; if(row && q > 0) items.push({ model: row.model, qty: q }); }); if(!items.length){ alert("حدد كمية للتسليم"); return; } showLoading("جاري تنفيذ التسليم..."); try{ const res = await jsonp("deliver", { client: currentClient, items: encodeItems(items) }); if(!res || !res.ok) throw new Error((res && res.error) || "تعذر تنفيذ التسليم"); clearClientStatusCache(currentClient); await Promise.all([ openClient(encodeURIComponent(currentClient), true), loadDashboard(readyFilter, true), loadSummary() ]); alert("تم التسليم بنجاح"); } catch(err){ alert(err.message || "حدث خطأ أثناء التسليم"); } finally { hideLoading(); } }
    function backToDashboard(){ openScreen("dashboardScreen"); }
    function debouncedSearch(){ clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 250); }
    async function doSearch(){ const q = $("searchInput").value.trim(); const wrap = $("searchResults"); if(!q){ wrap.innerHTML = `<div class="card empty">اكتب اسم العميل للبحث</div>`; return; } showLoading("جاري البحث..."); try{ const res = await jsonp("searchClients", { q }); const data = (res && res.data) || []; if(!data.length){ wrap.innerHTML = `<div class="card empty">لا توجد نتائج</div>`; return; } wrap.innerHTML = data.map(name => `<div class="card"><div class="client-row"><div class="client-main"><div class="client-name" onclick="openClient('${encodeURIComponent(name)}')">${esc(name)}</div></div><div><button class="soft-btn" onclick="openClient('${encodeURIComponent(name)}')">فتح</button></div></div></div>`).join(""); } catch(err){ wrap.innerHTML = `<div class="card empty">${esc(err.message || "حدث خطأ")}</div>`; } finally { hideLoading(); } }
    async function loadModels(){ showLoading("جاري تحميل الموديلات..."); try{ const res = await jsonp("getModelsByPrefix"); const data = (res && res.data) || {}; const keys = Object.keys(data); if(!keys.length){ $("modelsContainer").innerHTML = `<div class="card empty">لا توجد بيانات</div>`; return; } $("modelsContainer").innerHTML = keys.map(prefix => { const arr = data[prefix] || []; const total = arr.reduce((a,b)=>a+num(b.total),0); return `<div class="card"><div class="section-title"><h2>بادئة ${esc(prefix)}</h2><span class="chip">إجمالي المطلوب: ${esc(total)}</span></div><div class="table-wrap"><table><thead><tr><th>الموديل</th><th>الإجمالي</th><th>تفصيل العملاء</th></tr></thead><tbody>${arr.map(m => `<tr><td>${esc(m.model)}</td><td>${esc(m.total)}</td><td style="text-align:right">${(m.clients || []).map(c => `${esc(c.client)} (${esc(c.qty)})`).join("<br>")}</td></tr>`).join("")}</tbody></table></div></div>`; }).join(""); } catch(err){ $("modelsContainer").innerHTML = `<div class="card empty">${esc(err.message || "حدث خطأ")}</div>`; } finally { hideLoading(); } }
    function printSection(id){ document.querySelectorAll(".screen").forEach(s => s.classList.remove("print-target")); const parentScreen = $(id).closest(".screen"); if(parentScreen) parentScreen.classList.add("print-target"); window.print(); }
    function printCurrent(){ const current = document.querySelector(".screen.active"); if(current){ current.classList.add("print-target"); window.print(); setTimeout(() => current.classList.remove("print-target"), 500); } }
    function saveApiUrl(){ const v = $("apiUrlInput").value.trim(); if(!v){ alert("أدخل الرابط"); return; } localStorage.setItem(STORAGE_KEYS.API_URL, v); alert("تم حفظ الرابط"); }
    function resetApiUrl(){ localStorage.removeItem(STORAGE_KEYS.API_URL); $("apiUrlInput").value = DEFAULT_API_URL; alert("تم إرجاع الرابط الافتراضي"); }
    function initInstallPrompt(){ window.addEventListener("beforeinstallprompt", (e) => { e.preventDefault(); beforeInstallPromptEvent = e; maybeShowInstallButton(); }); }
    function maybeShowInstallButton(){ if(localStorage.getItem(STORAGE_KEYS.INSTALL_HIDDEN) === "1") return; if(!beforeInstallPromptEvent) return; const existing = document.getElementById("installNowBtn"); if(existing) return; const btn = document.createElement("button"); btn.id = "installNowBtn"; btn.className = "item primary"; btn.textContent = "تثبيت التطبيق"; btn.onclick = async function(){ try{ await beforeInstallPromptEvent.prompt(); localStorage.setItem(STORAGE_KEYS.INSTALL_HIDDEN, "1"); btn.remove(); } catch(_){} }; $("drawer").insertBefore(btn, $("adminArea")); }
    document.addEventListener("keydown", function(e){ if(!$("loginScreen").classList.contains("hide") && e.key === "Enter") doLogin(); });
    window.addEventListener("click", function(e){ const d = $("drawer"), b = $("drawerBackdrop"); if(d.classList.contains("show") && !d.contains(e.target) && !e.target.closest(".icon-btn")){ d.classList.remove("show"); b.classList.remove("show"); } });
    window.addEventListener("load", async function(){ $("apiUrlInput").value = getApiUrl(); const sess = loadSession(); if(sess){ currentUser = sess; $("loginScreen").classList.add("hide"); $("appScreen").classList.remove("hide"); $("adminArea").classList.toggle("hide", !isAdmin()); await bootApp(); } });
  </script>
</body>
